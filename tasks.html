<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEBUG: KAMACON Tasks</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <style>
        :root { --google-blue: #1a73e8; }
        body { background: #fff; font-family: sans-serif; padding-bottom: 80px; }
        .task-item { display: flex; align-items: flex-start; padding: 16px; border-bottom: 1px solid #f1f3f4; }
        .checkbox-round { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #dadce0; appearance: none; margin-right: 15px; flex-shrink: 0; }
        .task-title { font-size: 16px; color: #202124; }
        .fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; background: white; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #ddd; z-index: 999; }
        .modal-card { position: fixed; bottom: 0; margin: 0; width: 100%; border-radius: 20px 20px 0 0; transform: translateY(100%); transition: 0.3s; }
        .modal.is-active .modal-card { transform: translateY(0); }
        #debug-log { background: #fff3cd; padding: 10px; font-size: 12px; border-bottom: 1px solid #ffeeba; display: none; }
    </style>
</head>
<body>
    <div id="debug-log">System: Initializing...</div>

    <nav class="navbar is-white is-fixed-top px-4" style="border-bottom: 1px solid #dadce0;">
        <div class="navbar-brand"><h1 class="title is-4 py-4">Tasks (Debug Mode)</h1></div>
    </nav>

    <div class="container mt-6 pt-4" id="taskList">
        <p class="has-text-centered has-text-grey mt-6" id="status-msg">Attempting to connect to script...</p>
    </div>

    <button class="fab" onclick="openEditor()" id="addTaskBtn">
        <span style="font-size: 30px; color: #1a73e8; font-weight: bold;">+</span>
    </button>

    <div class="modal" id="taskModal">
        <div class="modal-background" onclick="closeEditor()"></div>
        <div class="modal-card">
            <section class="modal-card-body p-5">
                <input id="editTitle" class="input is-shadowless" placeholder="Task title" style="border:none; font-size: 20px;">
                <textarea id="editNotes" class="textarea is-shadowless mt-2" placeholder="Details" style="border:none"></textarea>
                <div class="mt-4">
                    <input type="date" id="editDate" class="input is-small mb-2">
                    <input type="url" id="editURL" class="input is-small" placeholder="https://link.com">
                </div>
                <div class="is-flex is-justify-content-between mt-5">
                    <button class="button is-light" onclick="archiveTask()">Delete</button>
                    <button class="button is-info is-rounded" onclick="saveTask()">Save Task</button>
                </div>
            </section>
        </div>
    </div>

    <script>
        // 3. Global Error Catcher
        window.onerror = function(msg, url, line) {
            alert("JS ERROR: " + msg + "\nLine: " + line);
            document.getElementById('debug-log').style.display = 'block';
            document.getElementById('debug-log').innerText = "ERROR: " + msg;
        };

        const SCRIPT_URL = "YOUR_APPS_SCRIPT_URL"; // PASTE URL HERE
        let tasks = [];
        let currentTaskId = null;

        function log(msg) {
            console.log(msg);
            document.getElementById('debug-log').style.display = 'block';
            document.getElementById('debug-log').innerText = "Log: " + msg;
        }

        async function fetchTasks() {
            if (SCRIPT_URL === "https://script.google.com/macros/s/AKfycbywdFiaQvUU8idDmhBiTqu8-Ir5-nFl1LNbIKrBOnm4QuWLiixY4rDOCbM2ZV7It0oc/execRL") {
                alert("CRITICAL: You forgot to paste your Script URL into line 95!");
                return;
            }

            log("Requesting tasks from Google...");
            const script = document.createElement('script');
            
            // 4. JSONP Error Handler
            script.onerror = () => alert("NETWORK ERROR: Could not reach the Script URL. Check your URL and Deployment settings.");
            
            script.src = `${SCRIPT_URL}?action=getTasks&callback=renderTasks`;
            document.head.appendChild(script);
        }

        window.renderTasks = function(response) {
            log("Response received! Task count: " + (response.tasks ? response.tasks.length : 0));
            document.getElementById('status-msg').style.display = 'none';
            
            tasks = response.tasks || [];
            const list = document.getElementById('taskList');
            list.innerHTML = tasks.length ? '' : '<p class="has-text-centered mt-6">No tasks found. Click + to add one.</p>';
            
            tasks.forEach(task => {
                const item = document.createElement('div');
                item.className = 'task-item';
                item.innerHTML = `<div class="task-title" onclick="openEditor('${task.ID}')">${task.Task || 'Untitled'}</div>`;
                list.appendChild(item);
            });
        };

        function openEditor(id = null) {
            currentTaskId = id;
            const task = tasks.find(t => t.ID == id) || { Task: '', Notes: '', DueDate: '', URL: '' };
            document.getElementById('editTitle').value = task.Task;
            document.getElementById('editNotes').value = task.Notes;
            document.getElementById('taskModal').classList.add('is-active');
        }

        function closeEditor() { document.getElementById('taskModal').classList.remove('is-active'); }

        async function saveTask() {
            log("Saving task...");
            const title = document.getElementById('editTitle').value;
            const params = new URLSearchParams({
                action: 'upsertTask',
                ID: currentTaskId || '',
                Task: title,
                Notes: document.getElementById('editNotes').value,
                DueDate: document.getElementById('editDate').value,
                URL: document.getElementById('editURL').value
            });

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: params, mode: 'no-cors' });
                alert("Save sent! Refreshing in 1 second...");
                closeEditor();
                setTimeout(fetchTasks, 1000);
            } catch (e) {
                alert("SAVE ERROR: " + e.message);
            }
        }

        window.onload = fetchTasks;
    </script>
</body>
</html>
