<!DOCTYPE html>
<html>
  <head>
    <title>KAMACON Budget App</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css" />
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; font-size: 16px; }
        .hero.is-primary.is-bold { padding: 1rem 1.0rem; }
        .hero .hero-body { padding: .25rem; }
        .hero .title { font-size: 1.5rem; }
        .container { padding-left: 15px !important; padding-right: 15px !important; width: 100%; }
        #calculation-summary { margin-top: 15px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; background-color: #f9f9f9; font-weight: bold; }
        #categorySummary { margin-left: 0 !important; margin-right: 0 !important; width: 100%; }
        .category-details { overflow-x: auto; width: 100%; -webkit-overflow-scrolling: touch; }
        .category-details thead th { position: sticky; top: 0; z-index: 1; background-color: #eeeeee; border-bottom: 2px solid #dbdbdb; }
        .box { transition: background-color 0.2s; border-radius: 6px; box-shadow: 0 2px 3px rgba(10, 10, 10, 0.1); }
        .progress { margin-bottom: 0.5rem !important; }
        .table-container { overflow-x: auto; width: 100%; -webkit-overflow-scrolling: touch; }
        @media (max-width: 600px) { .box { padding: 0.75rem !important; } }
    </style>
  </head>
  <body>
    <section class="hero is-primary is-bold">
      <div class="hero-body">
        <div class="container"><h1 class="title">KAMACON Budget (v1.1)</h1></div>
      </div>
      <div class="hero-foot">
        <nav class="tabs is-boxed is-fullwidth">
          <div class="container">
            <ul>
              <li class="is-active"><a href="index.html">📝 Entry Form</a></li>
              <li><a href="filter.html">📊 Analytics</a></li>
            </ul>
          </div>
        </nav>
      </div>
    </section>

    <form id="form" class="container m-4 pl-4">
      <div class="field">
        <label class="label">Date of Transaction</label>
        <div class="control"><input id="datePicker" class="input" type="date" name="Transaction Date" /></div>
      </div>

      <div class="field">
        <label class="label" id="amount-label">USD Value</label>
        <div class="control">
          <input id="amount" class="input" type="text" inputmode="decimal" placeholder="Enter Value" name="Original Value" />
        </div>
      </div>

      <div class="field">
        <div class="control">
          <label class="checkbox">
            <input id="euroCheckbox" type="checkbox" name="EUR Entry" value="Yes" onchange="updateAmountLabel()" /> EUR
          </label>
        </div>
      </div>

      <div id="calculation-summary" style="display: none;">
          <p>Calculated USD Expense: $<span id="calculated-usd">0.00</span></p>
      </div>

      <div class="field">
        <label class="label">Category</label>
        <div class="control">
          <select name="Category">
            <option value="">--Select a category--</option>
            <option value="Food">🍕 Food</option>
            <option value="Gas">🚗 Gas</option>
            <option value="Groceries">🛒 Groceries</option>
            <option value="Personal Care">💇🏻 Personal Care</option>
            <option value="Entertainment">🍿 Entertainment</option>
            <option value="Funny Money">😜 Funny Money</option>
            <option value="Travel">🌎 Travel</option>
            <option value="Shopping">🛍️ Shopping</option>
            <option value="Saving">🏦 Saving</option>
            <option value="Investment">📈 Investment</option>
            <option value="Other">📥 Other</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label class="label">Who Paid?</label>
        <div class="control">
          <label class="radio"><input type="radio" name="Payer" value="Matt" required /> Matt</label>
          <label class="radio"><input type="radio" name="Payer" value="Katie" required /> Katie</label>
        </div>
      </div>

      <div class="field">
        <label class="label">Additional Information</label>
        <div class="control"><textarea class="textarea" placeholder="Notes" name="Notes"></textarea></div>
      </div>

      <div class="field is-grouped">
        <div class="control"><button class="button is-primary" type="submit" id="submit-button">Submit</button></div>
        <div class="control"><button class="button is-danger" type="button" onclick="document.getElementById('form').reset(); calculateAndDisplay();">Cancel</button></div>
      </div>
    </form>

    <div class="container mt-4">
      <div class="is-flex is-justify-content-between is-align-items-center mb-3">
        <h2 class="title is-4 mb-0" id="monthDisplay">Monthly Spending</h2>
        <div class="field has-addons">
          <p class="control"><button class="button is-small is-primary is-outlined" onclick="changeMonth(-1)">←</button></p>
          <p class="control"><button class="button is-small is-primary is-outlined" onclick="goToToday()">Today</button></p>
          <p class="control"><button class="button is-small is-primary is-outlined" onclick="changeMonth(1)">→</button></p>
        </div>
      </div>
      <div id="categorySummary" class="columns is-mobile is-multiline">
        <p class="column is-full has-text-grey">Calculating totals...</p>
      </div>
    </div>

    <div class="container mt-4">
      <h2 class="title is-4">Recent Expenses</h2>
      <div id="expenseTableContainer" class="table-container">
          <p class="has-text-grey">Loading expenses...</p>
      </div>
    </div>

    <div id="message" style="display: none; margin: 20px; font-weight: bold; padding: 10px; border-radius: 4px;"></div>

    <script>
      let viewOffset = 0;
      let allExpenses = [];
      let latestEurRate = 0;
      let originalAmountInput = 0;

      function changeMonth(step) { viewOffset += step; updateView(); }
      function goToToday() { viewOffset = 0; updateView(); }

      function updateView() {
          const targetDate = new Date();
          targetDate.setDate(1); // Fix: Date overflow protection
          targetDate.setMonth(targetDate.getMonth() + viewOffset);
          
          const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
          const monthLabel = monthNames[targetDate.getMonth()] + " " + String(targetDate.getFullYear()).slice(-2);
          document.getElementById('monthDisplay').innerText = `Spending: ${monthLabel}`;
          fetchAndRenderExpenses(monthLabel);
      }

      // Initial Setup
      document.getElementById('datePicker').value = new Date().toISOString().split('T')[0];
      
      async function getDatRate() {
          try {
              const res = await fetch("https://open.er-api.com/v6/latest/USD");
              const data = await res.json();
              latestEurRate = data.rates.EUR; 
              calculateAndDisplay(); 
          } catch (e) { console.error(e); }
      }
      getDatRate();

      document.getElementById("amount").addEventListener('input', calculateAndDisplay);

      function updateAmountLabel() {
          const label = document.getElementById('amount-label');
          label.textContent = document.getElementById("euroCheckbox").checked ? "EUR Value (To USD)" : "USD Value";
          calculateAndDisplay();
      }

      function calculateAndDisplay() {
          const originalInput = parseFloat(document.getElementById("amount").value);
          if (isNaN(originalInput) || originalInput <= 0) {
              document.getElementById("calculation-summary").style.display = "none";
              return;
          }
          let finalUSD = document.getElementById("euroCheckbox").checked && latestEurRate > 0 ? originalInput / latestEurRate : originalInput;
          originalAmountInput = finalUSD;
          document.getElementById("calculated-usd").textContent = finalUSD.toFixed(2);
          document.getElementById("calculation-summary").style.display = "block";
      }

      // --- FORM SUBMISSION LOGIC (Replaces your entire redundant block) ---
      document.getElementById("form").addEventListener("submit", async function (e) {
          e.preventDefault(); // Stop page refresh

          // 1. SELECT ELEMENTS ONCE
          const categoryField = this.elements["Category"];
          const payerChecked = this.querySelector('input[name="Payer"]:checked');
          const messageDiv = document.getElementById("message");
          const submitBtn = document.getElementById("submit-button");

          // 2. SET UI STATE
          messageDiv.textContent = "Submitting..";
          messageDiv.style.display = "block";
          messageDiv.style.backgroundColor = "beige";
          messageDiv.style.color = "green";
          submitBtn.disabled = true;

          // 3. CONSTRUCT DATA PACKAGE
          const formData = new FormData(this);

          // 4. FIX: The M/K Mapping Logic (Applied to data, not the UI)
          // This ensures the Category is never blank in the sheet
          if (formData.get("Category") === "Funny Money" && payerChecked) {
              const mappedValue = (payerChecked.value === 'Matt') ? 'M Funny Money' : 'K Funny Money';
              formData.set("Category", mappedValue); 
          }

          // 5. Add the Calculated Price Data
          formData.append("Final USD Expense", originalAmountInput.toFixed(2));

          // 6. ENCODE FOR TRANSFER (Crucial for Emojis and spaces)
          const pairs = [];
          for (const pair of formData.entries()) {
              pairs.push(encodeURIComponent(pair[0]) + "=" + encodeURIComponent(pair[1]));
          }
          const formDataString = pairs.join("&");

          // 7. EXECUTE FETCH
          fetch(
              "https://script.google.com/macros/s/AKfycbywdFiaQvUU8idDmhBiTqu8-Ir5-nFl1LNbIKrBOnm4QuWLiixY4rDOCbM2ZV7It0oc/exec",
              {
                  redirect: "follow",
                  method: "POST",
                  body: formDataString,
                  headers: { "Content-Type": "application/x-www-form-urlencoded" },
              }
          )
          .then(response => {
              if (response.ok) {
                  messageDiv.textContent = "Data submitted successfully!";
                  messageDiv.style.backgroundColor = "green";
                  messageDiv.style.color = "white";
                  submitBtn.disabled = false;
                  
                  this.reset(); 
                  calculateAndDisplay(); 
                  goToToday(); // Refresh dashboard

                  setTimeout(() => { messageDiv.style.display = "none"; }, 3000);
              } else {
                  throw new Error("Submission failed");
              }
          })
          .catch(error => {
              console.error("Error:", error);
              messageDiv.textContent = "Error submitting data. Check Console.";
              messageDiv.style.backgroundColor = "red";
              submitBtn.disabled = false;
          });
      });

      function handleExpensesData(data) {
          const summaryContainer = document.getElementById('categorySummary');
          const tableContainer = document.getElementById('expenseTableContainer');
          if (!data || !data.expenses) return;

          allExpenses = data.expenses;
          const budgets = data.budgets || {};
          const viewDate = new Date(); viewDate.setDate(1); viewDate.setMonth(viewDate.getMonth() + viewOffset);
          const vMonth = viewDate.getMonth(), vYear = viewDate.getFullYear();

          let grandTotal = 0, budgetedSpendTotal = 0, totalBudgetLimit = 0;
          const actuals = {};
          Object.keys(budgets).forEach(cat => { totalBudgetLimit += budgets[cat]; });

          const monthlyExpenses = allExpenses.filter(row => {
              const d = new Date(row["Transaction Date"]);
              return d.getUTCMonth() === vMonth && d.getUTCFullYear() === vYear;
          });

          monthlyExpenses.forEach(row => {
              const cat = row["Category"] || "Other";
              const amt = parseFloat(row["Final USD Expense"]) || 0;
              actuals[cat] = (actuals[cat] || 0) + amt;
              grandTotal += amt;
              if (budgets[cat] !== undefined) budgetedSpendTotal += amt;
          });

          let summaryHTML = `<div class="column is-12"><div class="notification is-primary is-light p-3 mb-2"><p class="heading">Total Monthly Spend</p><p class="title is-4">$${grandTotal.toFixed(2)}</p></div></div>`;

          Object.keys(budgets).forEach(cat => {
              const spent = actuals[cat] || 0, limit = budgets[cat];
              // Progress Bar Fix for $0 budgets
              let percent = limit > 0 ? Math.min((spent / limit) * 100, 100) : (spent > 0 ? 100 : 0);
              let barColor = (percent >= 100 || (limit === 0 && spent > 0)) ? "is-danger" : (percent > 80 ? "is-warning" : "is-primary");

              summaryHTML += `
                <div class="column is-12">
                    <div class="box p-3 mb-2" onclick="toggleCategoryDetails('${cat}')" style="cursor: pointer;">
                        <div class="is-flex is-justify-content-between is-size-7 mb-1"><span class="has-text-weight-bold">${cat}</span><span>$${spent.toFixed(2)} / $${limit}</span></div>
                        <progress class="progress ${barColor} is-small" value="${spent > limit ? (limit || 1) : spent}" max="${limit || 1}">${percent}%</progress>
                        <div id="details-${cat}" class="category-details" style="display: none; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px;"><p class="is-size-7 has-text-grey">Loading...</p></div>
                    </div>
                </div>`;
          });
          summaryContainer.innerHTML = summaryHTML;

          const recentData = monthlyExpenses.slice(-5).reverse();
          let tableHTML = '<table class="table is-fullwidth is-striped is-narrow"><thead><tr><th>Date</th><th>Amt</th><th>Cat</th><th>Who</th></tr></thead><tbody>';
          recentData.forEach(row => {
              const d = new Date(row["Transaction Date"]);
              tableHTML += `<tr><td class="is-size-7">${(d.getUTCMonth() + 1)}/${d.getUTCDate()}</td><td class="is-size-7 has-text-weight-bold">$${parseFloat(row["Final USD Expense"]).toFixed(2)}</td><td class="is-size-7">${(row["Category"] || "").split(' ')[0]}</td><td class="is-size-7">${row["Payer"] === 'Matt' ? 'M' : 'K'}</td></tr>`;
          });
          tableContainer.innerHTML = tableHTML + '</tbody></table>';
      }

      function toggleCategoryDetails(category) {
          const div = document.getElementById(`details-${category}`);
          if (div.style.display === 'block') { div.style.display = 'none'; return; }
          const viewDate = new Date(); viewDate.setDate(1); viewDate.setMonth(viewDate.getMonth() + viewOffset);
          const filtered = allExpenses.filter(row => {
              const d = new Date(row["Transaction Date"]);
              return d.getUTCMonth() === viewDate.getMonth() && d.getUTCFullYear() === viewDate.getFullYear() && row["Category"] === category;
          }).reverse();

          let html = '<table class="table is-fullwidth is-narrow is-striped"><thead><tr><th class="is-size-7">Date</th><th class="is-size-7">Amt</th><th class="is-size-7">Notes</th></tr></thead><tbody>';
          filtered.forEach(row => {
              const d = new Date(row["Transaction Date"]);
              html += `<tr><td class="is-size-7">${(d.getUTCMonth() + 1)}/${d.getUTCDate()}</td><td class="is-size-7 has-text-weight-bold">$${parseFloat(row["Final USD Expense"]).toFixed(2)}</td><td class="is-size-7 italic">${row["Notes"] || "-"}</td></tr>`;
          });
          div.innerHTML = html + '</tbody></table>';
          div.style.display = 'block';
      }

      function fetchAndRenderExpenses(monthLabel = "") {
          const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywdFiaQvUU8idDmhBiTqu8-Ir5-nFl1LNbIKrBOnm4QuWLiixY4rDOCbM2ZV7It0oc/exec"; 
          if (!monthLabel) {
              const d = new Date();
              const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
              monthLabel = monthNames[d.getMonth()] + " " + String(d.getFullYear()).slice(-2);
          }
          const script = document.createElement('script');
          script.src = SCRIPT_URL + '?callback=handleExpensesData&monthYear=' + encodeURIComponent(monthLabel);
          document.head.appendChild(script);
      }
      fetchAndRenderExpenses();
    </script>
  </body>
</html>
