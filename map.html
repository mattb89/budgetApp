<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityMapper Studio</title>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #111; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 350px; background: #1a1a1a; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        #map-container { flex-grow: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #222; }
        
        /* The Canvas Poster Frame Frame */
        #poster-frame { width: 500px; height: 650px; background: #000000; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 12px solid #000; display: flex; flex-direction: column; position: relative; }
        #map { flex-grow: 1; width: 100%; }
        
        /* Poster Typography Label */
        #poster-label { height: 100px; background: #000000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: #d4af37; border-top: 2px solid #222; padding: 10px; }
        #label-main { font-size: 24px; font-weight: bold; letter-spacing: 4px; text-transform: uppercase; margin: 0; }
        #label-sub { font-size: 12px; letter-spacing: 2px; margin: 5px 0 0 0; color: #888; }
        
        /* UI Inputs */
        h2 { font-size: 18px; letter-spacing: 1px; margin: 0 0 10px 0; color: #e5e5e5; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; text-transform: uppercase; color: #aaa; letter-spacing: 1px; }
        input, select { background: #2b2b2b; border: 1px solid #444; padding: 10px; color: #fff; border-radius: 4px; font-size: 14px; }
        input:focus { border-color: #d4af37; outline: none; }
        button { background: #d4af37; color: #000; border: none; padding: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: background 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: #f1c40f; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div>
            <h2>1. Location Lookups</h2>
            <div class="input-group">
                <label>Coordinates (Lng, Lat)</label>
                <input type="text" id="coords-input" value="-98.4936, 29.4241">
                <button onclick="updateLocation()">Jump to Location</button>
            </div>
        </div>

        <div>
            <h2>2. Custom Typography</h2>
            <div class="input-group" style="margin-bottom: 10px;">
                <label>Main Heading</label>
                <input type="text" id="text-main-input" value="San Antonio" oninput="updateText()">
            </div>
            <div class="input-group">
                <label>Subtext / Coordinates</label>
                <input type="text" id="text-sub-input" value="TEXAS | 29.4241° N, 98.4936° W" oninput="updateText()">
            </div>
        </div>

        <div>
            <h2>3. Style Variant</h2>
            <div class="input-group">
                <label>Theme Preset</label>
                <select id="theme-select" onchange="changeTheme()">
                    <option value="https://tiles.openfreemap.org/styles/dark">High-Contrast Dark</option>
                    <option value="https://tiles.openfreemap.org/styles/liberty">Classic Minimalist</option>
                    <option value="https://tiles.openfreemap.org/styles/positron">Light Pastel</option>
                </select>
            </div>
        </div>

        <button style="margin-top: auto; background: #27ae60; color: white;" onclick="exportPoster()">Export High-Res Print</button>
    </div>

    <div id="map-container">
        <div id="poster-frame">
            <div id="map"></div>
            <div id="poster-label">
                <div id="label-main">San Antonio</div>
                <div id="label-sub">TEXAS | 29.4241° N, 98.4936° W</div>
            </div>
        </div>
    </div>

    <script>
        // Initialize MapLibre Engine over OpenFreeMap Dark Matter Endpoint
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://tiles.openfreemap.org/styles/dark', 
            center: [-98.4936, 29.4241], // Default coordinates
            zoom: 12,
            attributionControl: false // Turning off default map overlay placements
        });

        // Dynamic Text Updates
        function updateText() {
            document.getElementById('label-main').innerText = document.getElementById('text-main-input').value;
            document.getElementById('label-sub').innerText = document.getElementById('text-sub-input').value;
        }

        // Camera Positioning Function
        function updateLocation() {
            const coordString = document.getElementById('coords-input').value;
            const [lng, lat] = coordString.split(',').map(num => parseFloat(num.trim()));
            
            if(!isNaN(lng) && !isNaN(lat)) {
                map.flyTo({ center: [lng, lat], zoom: 12 });
            } else {
                alert("Please format coordinates cleanly as: Longitude, Latitude");
            }
        }

        // Map Theme Toggling
        function changeTheme() {
            const selectedStyle = document.getElementById('theme-select').value;
            map.setStyle(selectedStyle);
        }

        // Simple Snapshot Export (Simulating the High-Res Generation pipeline)
        function exportPoster() {
            alert("Application structure configured successfully. Hooking up production rendering vectors requires expanding canvas buffer targets.");
        }
    </script>
</body>
</html>
